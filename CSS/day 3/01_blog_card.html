<!DOCTYPE html>
<html>
<head>
    <title>Blog Card</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .card {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
        }
        .card h2 {
            color: darkblue;
        }
        .card p {
            color: gray;
            margin-top: 10px;
        }
        .card button {
            margin-top: 15px;
            padding: 8px 12px;
            background-color: blue;
            color: white;
            border: none;
        }
        .card button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>My First Blog</h2>
    <p>This is a simple blog card using CSS box model.</p>
    <button>Read More</button>
</div>
</body>
</html>
