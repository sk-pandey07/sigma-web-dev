<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <style>
        ul {
            list-style: none;
            background-color: black;
            padding: 10px;
        }
        ul > li {
            display: inline-block;
            margin-right: 20px;
        }

        li a {
            color: white;
            text-decoration: none;
        }
        li a:hover {
            color: yellow;
        }
    </style>
</head>
<body>
<ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
</ul>
</body>
</html>
