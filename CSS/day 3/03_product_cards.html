<!DOCTYPE html>
<html>
<head>
    <title>Product Box</title>
    <style>
        body {
            font-family: Arial;
        }
        .container {
            width: 600px;
            margin: 50px auto;
        }
        .box {
            border: 2px solid black;
            padding: 15px;
            margin: 10px;
            background-color: lightgray;
        }
        .title {
            font-weight: bold;
        }
        .price {
            color: green;
        }
        .box:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box">
        <p class="title">Product 1</p>
        <p class="price">₹500</p>
    </div>

    <div class="box">
        <p class="title">Product 2</p>
        <p class="price">₹800</p>
    </div>
</div>
</body>
</html>
