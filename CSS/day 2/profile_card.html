<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>
    <style>
        *{
            padding: 20;
        }
        h2{
            color: aliceblue;
        }
        .card{
            background: #371515d3;
        }
        #messege{
            background: blue;
        }
        .card > img{
            border-radius: 50%;
        }
        .skills > span{
            background: gray;
        }
        button:hover{
            transform: scale(1.1);
        }
        .skills span:nth-child(2) {
             background: orange;
        }
        div p {
          color: red;
        }

        .role {
          color: rgb(113, 0, 128);
        }
    </style>
</head>
<body>
    <header class="card">
        <img src="Screenshot 2026-04-04 232747.png" alt="profile" width="175">

        <h2>shashikant kumar</h2>
        <p class="role">Frontend devloper</p>
    </header>
    <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
    </div>

    <button class="follow">follow</button>
    <button id="messege">messege</button>
</body>
</html>
