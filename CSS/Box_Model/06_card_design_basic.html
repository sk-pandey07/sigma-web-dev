<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card design</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .card{
            background-color: rgb(153, 223, 200);
        width: 300px;
        padding: 200px;
        border-radius: 10;
        box-shadow: 0 4px 10px rgb;
        }
        .card h2{
            margin-bottom: 10;
            color: rgb(2, 2, 20);
        }
        .card p{
            color: black;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Learn css</h2>
        <p>CSS helps you design beautiful websites. Practice daily and build amazing UI components.</p>
    </div>
</body>
</html>
