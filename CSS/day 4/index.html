<!DOCTYPE html>
<html>
<head>
    <title>All Programs</title>

    <!-- CSS PART -->
    <style>
        body {
            font-family: Arial;
            background-color: lightgray;
        }

        h1, h2 {
            text-align: center;
        }

        /* Login */
        .login-box {
            width: 300px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            text-align: center;
        }

        input {
            margin: 5px;
            padding: 8px;
        }

        button {
            padding: 8px;
            background: green;
            color: white;
        }

        /* Navbar */
        ul {
            list-style: none;
            background: black;
            padding: 0;
        }

        ul li {
            display: inline;
        }

        ul li a {
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        ul li a:hover {
            background: gray;
        }

        /* Gallery */
        img {
            width: 150px;
            margin: 10px;
            border: 2px solid black;
        }

        /* Card */
        .card {
            width: 200px;
            border: 1px solid black;
            padding: 10px;
            margin: 20px auto;
            text-align: center;
            background: white;
        }

        /* Header Footer */
        header {
            background: blue;
            color: white;
            text-align: center;
            padding: 10px;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Columns */
        .left {
            width: 50%;
            float: left;
            background: lightblue;
        }

        .right {
            width: 50%;
            float: right;
            background: lightgreen;
        }

        .clear {
            clear: both;
        }
    </style>
</head>

<body>

    <h1>HTML + CSS All Programs</h1>

    <!-- Navbar -->
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

    <!-- Login -->
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button>Login</button>
    </div>

    <!-- Card -->
    <div class="card">
        <h3>Shashi</h3>
        <p>Web Developer</p>
    </div>

    <!-- Gallery -->
    <h2>Gallery</h2>
    <center>
        <img src="https://via.placeholder.com/150">
        <img src="https://via.placeholder.com/150">
        <img src="https://via.placeholder.com/150">
    </center>

    <!-- Layout -->
    <header>
        <h2>My Website</h2>
    </header>

    <p style="text-align:center;">Welcome to my website</p>

    <footer>
        <p>© 2026</p>
    </footer>

    <!-- Columns -->
    <div class="left">
        <h2>Left</h2>
    </div>

    <div class="right">
        <h2>Right</h2>
    </div>

    <div class="clear"></div>

</body>
</html>
