<!DOCTYPE html>
<html>
<head>
    <title>My Webpage</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
        }

        h1 {
            color: red;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: black;
        }

        .box {
            background-color: white;
            padding: 15px;
            margin: 20px;
            border: 2px solid black;
        }

        table {
            border-collapse: collapse;
            width: 50%;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        form {
            margin-top: 20px;
        }

        input {
            padding: 5px;
            margin: 5px;
        }

        button {
            background-color: green;
            color: white;
            padding: 8px;
            border: none;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <div class="box">
        <p>This is a simple HTML + CSS webpage</p>
    </div>
    <h2>Student Table</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Shashi</td>
            <td>20</td>
        </tr>
    </table>
    <h2>Registration Form</h2>
    <form>
        Name: <input type="text"><br>
        Email: <input type="email"><br>
        Password: <input type="password"><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
