<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table example</title>
</head>
<body>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>21</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td colspan="2">combine cell</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Rohit</td>
            <td>22</td>
            <td>Pune</td>
        </tr>
    </table>
</body>
</html>
