<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <legend>Registration Form</legend>
            <div>
                <label for="Name">Full-Name</label>
                <input type="text" id="Name" placeholder="Enter Your Name" required pattern="[a-zA-z]">
            </div>
            <div>
                <label for="email">Enter email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div>
                <label for="number">Contect number</label>
                <input type="number" id="number" placeholder="Enter your Number" required pattern="[0-9]">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter YourPassword" pattern="[a-zA-Z0-9]" required>
            </div>
            <div>
                <label>Gender:</label>

                <label for="male">Male</label>
                <input type="radio" id="male" name="gender" value="male">

                <label for="Female">Female</label>
                <input type="radio" id="Female" name="gender" value="femal">
            </div>
            <div>
                <label for="Country">Country</label>
                <select name="Country" id="Country">
                    <option value="india">india</option>
                    <option value="Usa">Usa</option>
                    <option value="China">China</option>
                    <option value="nepal">nepal</option>
                    <option value="Hongkong">Hongkong</option>
                </select>
            </div>
            <div>
                <label for="massege">Massege</label>
                <textarea name="massage" id="massege" rows="4" cols="50">Enter your massege...</textarea>
            </div>
            <div>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </fieldset>
    </form>
</body>
</html>
